<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♟ ChessFred — Mes parties</title>
<style>
:root {
  --bg: #2c1a0e; --surface: #3d2410; --surface2: #4e2f14; --border: #8b5a2b;
  --gold: #d4a030; --gold-light: #f0c84a; --gold-dim: #9a7040;
  --text: #f5e6c8; --text-dim: #b8905a;
  --btn: #5a3418; --btn-border: #9a6a30; --btn-text: #f5dfa0;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:Georgia,serif; }
body {
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(160,90,30,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(100,50,10,0.35) 0%, transparent 50%);
}
.container { max-width:700px; margin:0 auto; padding:28px 16px 40px; }
.logo { font-size:1.6rem; color:var(--gold-light); font-weight:bold; letter-spacing:0.1em; text-align:center; margin-bottom:6px; }
.logo span { display:block; font-size:0.65rem; color:var(--gold-dim); letter-spacing:0.3em; text-transform:uppercase; margin-top:2px; }
.subtitle { text-align:center; font-size:0.82rem; color:var(--text-dim); margin-bottom:24px; }

/* Search */
.search-bar { display:flex; gap:8px; margin-bottom:16px; }
.search-bar input {
  flex:1; background:var(--btn); color:var(--btn-text);
  border:1px solid var(--btn-border); padding:9px 12px;
  border-radius:7px; font-size:0.9rem; font-family:Georgia,serif;
}
.search-bar input:focus { outline:none; border-color:var(--gold); }

/* File list */
.file-list { display:flex; flex-direction:column; gap:8px; }
.file-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:9px; padding:14px 16px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:border-color 0.15s, background 0.15s;
  text-decoration:none; color:inherit;
}
.file-item:hover { border-color:var(--gold); background:var(--surface2); }
.file-icon { font-size:1.4rem; flex-shrink:0; }
.file-info { flex:1; min-width:0; }
.file-name { font-size:0.95rem; color:var(--text); font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-meta { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
.file-arrow { color:var(--gold-dim); font-size:1.1rem; flex-shrink:0; }

/* States */
.loading { text-align:center; padding:40px; color:var(--text-dim); font-style:italic; }
.empty { text-align:center; padding:40px; color:var(--text-dim); }
.empty strong { display:block; color:var(--text); margin-bottom:6px; font-size:1rem; }
.error-box { background:#5a1a0a; border:1px solid #dd4422; border-radius:8px; padding:14px; text-align:center; color:#ffaa80; font-size:0.88rem; }

/* Stats */
.stats { text-align:center; font-size:0.75rem; color:var(--text-dim); margin-bottom:14px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">♟ ChessFred<span>Bibliothèque de parties</span></div>
  <div class="subtitle">Cliquez sur un fichier pour visionner la partie</div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍 Rechercher un fichier…" oninput="filterFiles()">
  </div>

  <div class="stats" id="stats"></div>
  <div class="file-list" id="file-list">
    <div class="loading">⏳ Chargement des parties…</div>
  </div>
</div>

<script>
// ── CONFIG ──
const GITHUB_USER = "Ymorale-be";
const GITHUB_REPO = "Mes-parties";
const VIEWER_URL  = "https://ymorale-be.github.io/Visionneur/";

let allFiles = [];

async function loadFiles() {
  const list = document.getElementById("file-list");
  try {
    // API GitHub — liste les fichiers du dépôt
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    // Garder uniquement les .pgn
    allFiles = data
      .filter(f => f.type === "file" && f.name.toLowerCase().endsWith(".pgn"))
      .sort((a, b) => a.name.localeCompare(b.name));

    renderFiles(allFiles);
  } catch(e) {
    list.innerHTML = `<div class="error-box">❌ Impossible de charger la liste.<br><span style="font-size:0.78rem;">${e.message}</span></div>`;
  }
}

function formatName(filename) {
  // Retirer l'extension et remplacer _ et - par des espaces
  return filename.replace(/\.pgn$/i, "").replace(/[_-]/g, " ");
}

function renderFiles(files) {
  const list = document.getElementById("file-list");
  const stats = document.getElementById("stats");

  if (!files.length) {
    list.innerHTML = `<div class="empty"><strong>Aucun fichier PGN trouvé</strong>Ajoutez des fichiers .pgn dans le dépôt ${GITHUB_REPO}</div>`;
    stats.textContent = "";
    return;
  }

  stats.textContent = `${files.length} fichier${files.length > 1 ? "s" : ""} disponible${files.length > 1 ? "s" : ""}`;

  list.innerHTML = "";
  files.forEach(f => {
    let item = document.createElement("div");
    item.className = "file-item";
    item.innerHTML = `
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">${formatName(f.name)}</div>
        <div class="file-meta">${f.name}</div>
      </div>
      <div class="file-arrow">▶</div>`;
    item.onclick = () => openFile(f);
    list.appendChild(item);
  });
}

async function openFile(f) {
  // Récupérer le PGN puis l'envoyer au visionneur via JSONbin ou URL directe
  let arrow = event.currentTarget.querySelector(".file-arrow");
  if (arrow) arrow.textContent = "⏳";

  try {
    // Télécharger le contenu raw
    const res = await fetch(f.download_url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const pgn = await res.text();

    // Essayer JSONbin pour un lien court
    const JSONBIN_KEY = "$2a$10$7eQUj80MVRql06cbeA.vtOD3ChyZOCQNeEkvXTvZ0pjVBQst.0Qcq";
    try {
      const jRes = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY,
          "X-Bin-Private": "false",
          "X-Bin-Name": f.name
        },
        body: JSON.stringify({ pgn })
      });
      const jData = await jRes.json();
      if (jData.metadata && jData.metadata.id) {
        window.open(VIEWER_URL + "?id=" + jData.metadata.id, "_blank");
        if (arrow) arrow.textContent = "▶";
        return;
      }
    } catch(e) {}

    // Fallback : URL avec PGN encodé
    window.open(VIEWER_URL + "?pgn=" + encodeURIComponent(pgn), "_blank");
  } catch(e) {
    alert("Impossible de charger ce fichier : " + e.message);
  }
  if (arrow) arrow.textContent = "▶";
}

function filterFiles() {
  const q = document.getElementById("search").value.toLowerCase();
  if (!q) { renderFiles(allFiles); return; }
  renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(q)));
}

loadFiles();
</script>
</body>
</html>
